<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Peter Chen's Pac-Man: Database 3FN Quiz Fixed</title>
    <style>
        body {
            margin: 0;
            background-color: #121214;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        h1 {
            margin: 10px 0 2px 0;
            font-size: 28px;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            margin: 0 0 20px 0;
            color: #a0a0b0;
            font-size: 13px;
            font-weight: bold;
        }

        #game-layout {
            display: flex;
            gap: 25px;
            background: #1a1a1e;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #2e2e38;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #canvas-container {
            position: relative;
            width: 570px;
            height: 600px;
        }

        canvas {
            background-color: #000000;
            display: block;
            border: 4px solid #0000ff;
            border-radius: 4px;
        }

        /* Painel Lateral */
        #control-panel {
            width: 280px;
            background: #111113;
            border: 2px solid #2e2e38;
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: left;
        }

        .panel-section {
            border-bottom: 2px solid #2e2e38;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .panel-section:last-child {
            border: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            color: #f1c40f;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .data-row {
            font-size: 12px;
            margin: 6px 0;
            color: #d1d1d6;
            display: flex;
            justify-content: space-between;
        }

        .highlight-green {
            color: #2ecc71;
            font-weight: bold;
        }

        .highlight-yellow {
            color: #f1c40f;
            font-weight: bold;
        }

        .lives-container {
            color: #e74c3c;
            font-size: 16px;
            letter-spacing: 2px;
        }

        #power-timer-container {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
            display: none;
        }

        #power-bar {
            width: 100%;
            height: 100%;
            background: #2ecc71;
        }

        /* Telas sobrepostas */
        #screen-overlay, #quiz-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #screen-overlay {
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
        }

        #quiz-overlay {
            background: rgba(10, 11, 20, 0.95);
            border: 4px solid #f1c40f;
            z-index: 20;
            padding: 30px;
        }

        #overlay-title {
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #e74c3c;
        }

        #overlay-desc {
            color: #d1d1d6;
            font-size: 14px;
            padding: 0 40px;
            line-height: 1.6;
            margin-bottom: 25px;
            text-align: center;
        }

        #quiz-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        #quiz-question {
            font-size: 14px;
            color: #e2e2e9;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            line-height: 1.5;
            background: #1e1e24;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #3a3a45;
            width: 100%;
            box-sizing: border-box;
        }

        #quiz-options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .quiz-option-btn {
            background: #25252d;
            color: #ffffff;
            border: 2px solid #3e3e4a;
            padding: 12px 15px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
        }

        .quiz-option-btn:hover {
            background: #f1c40f;
            color: #000;
            border-color: #f1c40f;
            font-weight: bold;
        }

        .quiz-option-btn.correct {
            background: #2ecc71 !important;
            color: #fff !important;
            border-color: #2ecc71 !important;
            font-weight: bold;
        }

        .quiz-option-btn.wrong {
            background: #e74c3c !important;
            color: #fff !important;
            border-color: #e74c3c !important;
            font-weight: bold;
        }

        #quiz-feedback {
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        button.menu-btn {
            background: #f1c40f;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button.menu-btn:hover {
            background: #f39c12;
        }
    </style>
</head>
<body>

    <h1>Peter Chen's Pac-Man</h1>
    <div class="subtitle">PROJETO LOGÍSTICO COMIDINHAS DO RAUL - MODELO 3FN</div>

    <div id="game-layout">
        <div id="canvas-container">
            <canvas id="gameCanvas" width="570" height="600"></canvas>
            
            <div id="quiz-overlay">
                <div id="quiz-title">⚡ DESAFIO DA SUPER PASTILHA 3FN</div>
                <div id="quiz-question">Carregando pergunta...</div>
                <div id="quiz-options"></div>
                <div id="quiz-feedback"></div>
            </div>

            <div id="screen-overlay">
                <h2 id="overlay-title">FIM DE JOGO</h2>
                <p id="overlay-desc">Mensagem de status...</p>
                <p style="font-size: 18px; margin-bottom: 20px;">Pontos Obtidos
